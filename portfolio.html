<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Portfolio</title>
    <link rel="stylesheet" href="style-portfolio.css">
</head>

<body>

	<header class="portfolio-header">
		<h1 class="portfolio-title">Portfolio</h1>
	</header>

	<main class="portfolio-main">

		<section class="portfolio-nota">
			<p><strong>Nota:</strong> estos dibujos están publicados en mis redes (o lo estarán en breves).</p>
			<p><strong>¡Pronto se añadirá más contenido!</strong></p>
		</section>

		<section class="portfolio-year">
			<h2 class="year-title">2026</h2>
            <div class="galeria">
                <figure class="galeria-item">
                    <img src="img/Portfolio/2026/imagen1.png" alt="Dibujo 1 de 2026">
                </figure>
                <figure class="galeria-item">
                    <img src="img/Portfolio/2026/imagen2.png" alt="Dibujo 2 de 2026">
                </figure>
                <figure class="galeria-item">
                    <img src="img/Portfolio/2026/imagen3.png" alt="Dibujo 3 de 2026">
                </figure>
				<figure class="galeria-item">
					<img src="img/Portfolio/2026/imagen4.png" alt="Dibujo 4 de 2026">
				</figure>
				<figure class="galeria-item">
					<img src="img/Portfolio/2026/imagen5.png" alt="Dibujo 5 de 2026">
				</figure>
				<figure class="galeria-item">
					<img src="img/Portfolio/2026/imagen6.png" alt="Dibujo 6 de 2026">
				</figure>
				<figure class="galeria-item">
					<img src="img/Portfolio/2026/imagen7.png" alt="Dibujo 7 de 2026">
				</figure>
				<figure class="galeria-item">
					<img src="img/Portfolio/2026/imagen8.png" alt="Dibujo 8 de 2026">
				</figure>
            </div>
		</section>

	</main>

	<footer class="portfolio-footer">
		<p>© 2026 - Mi portfolio artístico</p>
	</footer>

</body>
</html>
